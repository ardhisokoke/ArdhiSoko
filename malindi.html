<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Malindi Ocean View Acres — ArdhiSoko</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#F5921E;--orange-dark:#c47518;--orange-light:#feefdd;
  --green:#2E7D1F;--green-dark:#256419;--green-light:#e0ecdd;
  --black:#1A1A1A;--gray-dark:#333;--gray:#666;--gray-light:#F5F5F5;
  --border:#E0E0E0;--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Open Sans',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden;}

/* ── TOP BAR ── */
.top-bar{background:var(--green);display:flex;justify-content:space-between;align-items:center;padding:.38rem 5rem;font-size:.75rem;color:rgba(255,255,255,.9);}
.top-bar-left{display:flex;gap:1.5rem;align-items:center;}
.top-bar-left a{color:rgba(255,255,255,.9);text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;transition:color .2s;}
.top-bar-left a:hover{color:#fff;}
.top-bar-right{display:flex;align-items:center;gap:.15rem;}
.tb-social{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;color:rgba(255,255,255,.8);transition:background .2s,color .2s;text-decoration:none;}
.tb-social svg{width:13px;height:13px;}
.tb-social:hover{background:rgba(255,255,255,.2);color:#fff;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:200;background:var(--white);border-bottom:2px solid var(--border);display:flex;align-items:center;padding:.7rem 5rem;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.logo{display:flex;align-items:center;gap:.55rem;text-decoration:none;}
.logo-triangle{width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:22px solid var(--green);flex-shrink:0;}
.logo-text{font-family:'Montserrat',sans-serif;font-size:1.55rem;font-weight:800;letter-spacing:-.02em;line-height:1;}
.logo-text .ardhi{color:var(--black);}.logo-text .soko{color:var(--orange);}
.logo-tagline{font-size:.62rem;color:var(--gray);letter-spacing:.04em;margin-top:2px;}
.nav-search{display:flex;align-items:center;margin-left:auto;background:#f4f4f4;border:1.5px solid var(--border);border-radius:24px;overflow:hidden;transition:border-color .2s;}
.nav-search:focus-within{border-color:var(--orange);}
.nav-search-input{border:none;background:transparent;padding:.45rem 1rem;font-size:.82rem;font-family:'Open Sans',sans-serif;color:var(--black);outline:none;width:240px;}
.nav-search-input::placeholder{color:#aaa;}
.nav-search-btn{background:var(--orange);border:none;padding:.45rem .9rem;cursor:pointer;font-size:.9rem;color:#fff;transition:background .2s;flex-shrink:0;}
.nav-search-btn:hover{background:var(--green);}

/* ── PAGE MENU ── */
.page-menu{background:var(--orange);border-bottom:1px solid rgba(255,255,255,.15);position:sticky;top:62px;z-index:199;}
.pm-desktop{display:flex;align-items:center;padding:0 5rem;}
.pm-link{font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.85);text-decoration:none;padding:.65rem 1.4rem;display:inline-flex;align-items:center;gap:.3rem;border-right:1px solid rgba(255,255,255,.15);transition:background .2s,color .2s;white-space:nowrap;}
.pm-link:hover,.pm-link.pm-active{background:rgba(0,0,0,.12);color:#fff;}
.pm-dropdown{position:relative;}
.pm-dropdown:hover .pm-drop-panel{opacity:1;pointer-events:all;transform:translateY(0);}
.pm-drop-panel{position:absolute;top:100%;left:0;background:#fff;border-radius:0 0 8px 8px;box-shadow:0 8px 24px rgba(0,0,0,.12);min-width:240px;opacity:0;pointer-events:none;transform:translateY(-6px);transition:all .2s;z-index:300;}
.pm-drop-link{display:block;padding:.75rem 1.2rem;font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:600;color:var(--black);text-decoration:none;border-bottom:1px solid var(--border);transition:background .15s,color .15s;}
.pm-drop-link:last-child{border-bottom:none;}
.pm-drop-link:hover{background:var(--orange);color:#fff;}
.pm-mobile{display:none;grid-template-columns:repeat(3,1fr);}
.pm-m-link{font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.85);text-decoration:none;padding:.55rem .5rem;text-align:center;border-right:1px solid rgba(255,255,255,.15);border-bottom:1px solid rgba(255,255,255,.15);transition:background .2s;}
.pm-m-link:hover,.pm-m-link.pm-active{background:rgba(0,0,0,.12);color:#fff;}
.pm-m-link:nth-child(3n){border-right:none;}
.pm-m-link:nth-child(4),.pm-m-link:nth-child(5),.pm-m-link:nth-child(6){border-bottom:none;}

/* ── BREADCRUMB / PAGE HERO ── */
.page-hero{background:var(--green);padding:2.5rem 5rem;}
.page-hero-eyebrow{font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:.6rem;}
.page-hero h1{font-family:'Montserrat',sans-serif;font-size:clamp(1.6rem,3vw,2.4rem);font-weight:900;color:#fff;line-height:1.2;}
.page-hero h1 span{color:var(--orange);}
.page-hero p{font-size:.9rem;color:rgba(255,255,255,.7);margin-top:.8rem;max-width:560px;line-height:1.7;}
.breadcrumb{display:flex;align-items:center;gap:.5rem;font-size:.72rem;font-family:'Montserrat',sans-serif;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:1rem;}
.breadcrumb a{color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s;}
.breadcrumb a:hover{color:#fff;}
.breadcrumb span{color:rgba(255,255,255,.8);}

/* ── PHOTO GALLERY ── */
.gallery-wrap{background:#111;position:relative;}
.gallery-main{position:relative;height:520px;overflow:hidden;cursor:zoom-in;}
.gallery-main img{width:100%;height:100%;object-fit:cover;transition:transform .6s;}
.gallery-main:hover img{transform:scale(1.03);}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 50%);}
.gallery-badge{position:absolute;top:1.5rem;left:1.5rem;background:var(--green);color:#fff;font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .9rem;border-radius:3px;}
.gallery-status{position:absolute;top:1.5rem;right:1.5rem;background:var(--orange);color:#fff;font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .9rem;border-radius:3px;display:flex;align-items:center;gap:.4rem;}
.gallery-status::before{content:'';width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.gallery-counter{position:absolute;bottom:1.5rem;right:1.5rem;background:rgba(0,0,0,.6);color:#fff;font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:700;padding:.35rem .8rem;border-radius:3px;display:flex;align-items:center;gap:.4rem;}
.gallery-arrows{position:absolute;bottom:1.5rem;left:1.5rem;display:flex;gap:.5rem;}
.g-arrow{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px);}
.g-arrow:hover{background:var(--orange);border-color:var(--orange);}
.gallery-thumbs{display:flex;gap:6px;padding:6px;background:#111;overflow-x:auto;scrollbar-width:none;}
.gallery-thumbs::-webkit-scrollbar{display:none;}
.g-thumb{width:100px;height:68px;flex-shrink:0;border-radius:4px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,opacity .2s;opacity:.6;}
.g-thumb:hover{opacity:1;}
.g-thumb.active{border-color:var(--orange);opacity:1;}
.g-thumb img{width:100%;height:100%;object-fit:cover;}

/* ── MAIN CONTENT LAYOUT ── */
.product-layout{display:grid;grid-template-columns:1fr 380px;gap:0;align-items:start;padding:3.5rem 5rem;gap:3rem;}

/* ── LEFT COLUMN ── */
.prod-left{}

/* Price bar */
.price-bar{display:flex;align-items:center;justify-content:space-between;background:var(--gray-light);border-radius:8px;padding:1.4rem 1.8rem;margin-bottom:2rem;border-left:4px solid var(--green);}
.price-main{font-family:'Montserrat',sans-serif;font-size:2.2rem;font-weight:900;color:var(--green);line-height:1;}
.price-sub{font-size:.78rem;color:var(--gray);margin-top:.25rem;}
.price-meta{text-align:right;}
.price-badge{display:inline-block;background:var(--orange-light);color:var(--orange-dark);font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:800;padding:.3rem .75rem;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.3rem;}
.price-avail{font-size:.75rem;color:var(--gray);}

/* Section blocks */
.prod-section{margin-bottom:2.5rem;}
.prod-section-title{font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);margin-bottom:.9rem;display:flex;align-items:center;gap:.6rem;}
.prod-section-title::before{content:'';width:22px;height:2px;background:var(--orange);}

/* Description */
.prod-desc{font-size:.93rem;color:var(--gray-dark);line-height:1.85;}
.prod-desc p{margin-bottom:.9rem;}
.prod-desc p:last-child{margin:0;}

/* Key specs grid */
.specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.spec-card{background:var(--gray-light);border-radius:8px;padding:1.1rem 1rem;border-bottom:3px solid var(--orange);}
.spec-val{font-family:'Montserrat',sans-serif;font-size:1.2rem;font-weight:900;color:var(--black);line-height:1;}
.spec-key{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);margin-top:.3rem;}

/* Features list */
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;}
.feat-item{display:flex;align-items:center;gap:.65rem;font-size:.86rem;color:var(--gray-dark);}
.feat-icon{width:28px;height:28px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:.78rem;flex-shrink:0;color:var(--green);}

/* Payment plan */
.payment-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
.pay-card{border:1.5px solid var(--border);border-radius:8px;padding:1.2rem;text-align:center;transition:border-color .2s,box-shadow .2s;}
.pay-card.featured{border-color:var(--orange);background:var(--orange-light);}
.pay-card:hover{border-color:var(--orange);box-shadow:0 4px 16px rgba(245,146,30,.15);}
.pay-label{font-family:'Montserrat',sans-serif;font-size:.58rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);margin-bottom:.5rem;}
.pay-card.featured .pay-label{color:var(--orange-dark);}
.pay-pct{font-family:'Montserrat',sans-serif;font-size:1.6rem;font-weight:900;color:var(--black);}
.pay-card.featured .pay-pct{color:var(--orange-dark);}
.pay-detail{font-size:.72rem;color:var(--gray);margin-top:.3rem;line-height:1.5;}
.pay-tag{display:inline-block;background:var(--orange);color:#fff;font-family:'Montserrat',sans-serif;font-size:.55rem;font-weight:800;padding:.18rem .55rem;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem;}

/* Location map */
.map-wrap{border-radius:10px;overflow:hidden;border:1.5px solid var(--border);position:relative;}
.map-frame{width:100%;height:360px;border:none;display:block;}
.map-overlay-badge{position:absolute;bottom:1rem;left:1rem;background:rgba(0,0,0,.75);color:#fff;font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:700;padding:.45rem .9rem;border-radius:4px;display:flex;align-items:center;gap:.4rem;backdrop-filter:blur(4px);}
.loc-details{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-top:1rem;}
.loc-item{display:flex;align-items:flex-start;gap:.6rem;font-size:.83rem;color:var(--gray-dark);}
.loc-icon{font-size:1rem;flex-shrink:0;margin-top:.05rem;}
.loc-text strong{display:block;font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:800;color:var(--black);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.15rem;}

/* Subdivision map */
.subdiv-wrap{border-radius:10px;overflow:hidden;border:1.5px solid var(--border);background:#f9f6f0;}
.subdiv-header{background:var(--black);padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;}
.subdiv-title{font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:800;color:#fff;letter-spacing:.1em;text-transform:uppercase;}
.subdiv-legend{display:flex;gap:1rem;}
.legend-item{display:flex;align-items:center;gap:.35rem;font-size:.62rem;color:rgba(255,255,255,.6);}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.subdiv-svg-wrap{padding:1.5rem;background:#f9f6f0;overflow-x:auto;}
.subdiv-note{padding:.8rem 1.2rem;background:var(--gray-light);font-size:.72rem;color:var(--gray);display:flex;align-items:center;gap:.5rem;}

/* ── RIGHT STICKY PANEL ── */
.prod-sticky{position:sticky;top:120px;}
.sticky-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08);}
.sticky-top{background:var(--green);padding:1.4rem 1.6rem;}
.sticky-price{font-family:'Montserrat',sans-serif;font-size:1.9rem;font-weight:900;color:#fff;line-height:1;}
.sticky-price-sub{font-size:.72rem;color:rgba(255,255,255,.65);margin-top:.2rem;}
.sticky-avail{display:flex;align-items:center;gap:.5rem;margin-top:.8rem;}
.avail-dot{width:8px;height:8px;border-radius:50%;background:#7CFC00;animation:blink 2s infinite;}
.avail-text{font-family:'Montserrat',sans-serif;font-size:.72rem;font-weight:700;color:rgba(255,255,255,.85);}
.sticky-body{padding:1.4rem 1.6rem;}
.sticky-specs{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.2rem;}
.ss-item{background:var(--gray-light);border-radius:6px;padding:.7rem .8rem;}
.ss-val{font-family:'Montserrat',sans-serif;font-size:.92rem;font-weight:800;color:var(--black);}
.ss-key{font-size:.6rem;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:.15rem;}
.sticky-divider{height:1px;background:var(--border);margin:.9rem 0;}
.sticky-label{font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gray);margin-bottom:.7rem;}
.form-group{margin-bottom:.85rem;}
.form-group input,.form-group select{width:100%;padding:.72rem .9rem;border:1.5px solid var(--border);border-radius:6px;font-family:'Open Sans',sans-serif;font-size:.85rem;color:var(--black);outline:none;transition:border-color .2s;background:var(--white);appearance:none;}
.form-group input:focus,.form-group select:focus{border-color:var(--orange);}
.cta-primary{width:100%;background:var(--orange);color:#fff;border:none;padding:1rem;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:.88rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-bottom:.6rem;}
.cta-primary:hover{background:var(--orange-dark);}
.cta-wa{width:100%;background:#25D366;color:#fff;border:none;padding:.85rem;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;text-decoration:none;}
.cta-wa:hover{background:#1da851;}
.cta-call{width:100%;background:none;color:var(--green);border:1.5px solid var(--green);padding:.75rem;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;text-decoration:none;margin-top:.5rem;}
.cta-call:hover{background:var(--green);color:#fff;}
.sticky-trust{margin-top:1.2rem;padding-top:1.2rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.5rem;}
.trust-item{display:flex;align-items:center;gap:.5rem;font-size:.73rem;color:var(--gray-dark);}
.trust-icon{color:var(--green);font-size:.85rem;flex-shrink:0;}

/* ── NEARBY / SIMILAR ── */
.similar-section{padding:3.5rem 5rem;background:var(--gray-light);}
.sec-eyebrow{font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--orange);margin-bottom:.6rem;display:flex;align-items:center;gap:.6rem;}
.sec-eyebrow::before{content:'';width:28px;height:3px;background:var(--orange);display:inline-block;}
.sec-title{font-family:'Montserrat',sans-serif;font-size:clamp(1.6rem,2.8vw,2.2rem);font-weight:900;line-height:1.18;color:var(--black);margin-bottom:2rem;}
.sec-title span{color:var(--green);}
.similar-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;}
.sim-card{background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--border);display:flex;transition:transform .3s,box-shadow .3s;cursor:pointer;}
.sim-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.1);}
.sim-img{width:140px;flex-shrink:0;overflow:hidden;}
.sim-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.sim-card:hover .sim-img img{transform:scale(1.08);}
.sim-body{padding:1.2rem;flex:1;}
.sim-loc{font-family:'Montserrat',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin-bottom:.3rem;}
.sim-name{font-family:'Montserrat',sans-serif;font-size:.92rem;font-weight:900;color:var(--black);margin-bottom:.5rem;line-height:1.25;}
.sim-feats{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.8rem;}
.sim-feat{background:var(--gray-light);font-size:.62rem;font-family:'Montserrat',sans-serif;font-weight:600;color:#555;padding:.18rem .55rem;border-radius:10px;}
.sim-footer{display:flex;align-items:center;justify-content:space-between;}
.sim-price{font-family:'Montserrat',sans-serif;font-size:1rem;font-weight:900;color:var(--green);}
.sim-cta{background:var(--orange);color:#fff;border:none;padding:.4rem .95rem;border-radius:3px;font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:700;cursor:pointer;transition:background .2s;text-decoration:none;}
.sim-cta:hover{background:var(--orange-dark);}

/* ── FOOTER ── */
footer{background:var(--black);padding:4.5rem 5rem 2rem;}
.f-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1.2fr;gap:3rem;padding-bottom:3rem;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:2rem;}
.f-logo-wrap{margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;}
.f-logo-tri{width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:18px solid var(--green);}
.f-logo-text{font-family:'Montserrat',sans-serif;font-size:1.35rem;font-weight:900;}
.f-logo-text .ardhi{color:var(--white);}.f-logo-text .soko{color:var(--orange);}
.f-tagline{font-size:.62rem;color:rgba(255,255,255,.3);letter-spacing:.08em;margin-top:-2px;}
.f-about{font-size:.82rem;color:rgba(255,255,255,.35);line-height:1.75;margin-bottom:1.5rem;}
.f-socials{display:flex;gap:.5rem;}
.fsoc{width:34px;height:34px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:.82rem;color:rgba(255,255,255,.4);cursor:pointer;border-radius:3px;transition:all .2s;}
.fsoc:hover{background:var(--orange);border-color:var(--orange);color:var(--white);}
.f-col h5{font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);margin-bottom:1.2rem;}
.f-links{list-style:none;}
.f-links li{margin-bottom:.6rem;}
.f-links a{font-size:.83rem;color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s;}
.f-links a:hover{color:var(--white);}
.f-contact{list-style:none;}
.f-contact li{display:flex;align-items:flex-start;gap:.65rem;margin-bottom:.8rem;font-size:.83rem;color:rgba(255,255,255,.35);}
.f-bottom{display:flex;justify-content:space-between;align-items:center;font-size:.74rem;color:rgba(255,255,255,.2);font-family:'Montserrat',sans-serif;font-weight:500;}

/* ── WA FLOAT ── */
.wa-btn{position:fixed;bottom:1.8rem;right:1.8rem;z-index:999;background:#25D366;color:var(--white);width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;text-decoration:none;box-shadow:0 4px 20px rgba(37,211,102,.5);transition:transform .2s;}
.wa-btn:hover{transform:scale(1.1);}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:#fff;font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:700;padding:.85rem 1.8rem;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .3s,opacity .3s;opacity:0;z-index:9999;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .top-bar,.page-hero,footer{padding-left:2rem;padding-right:2rem;}
  nav{padding:.7rem 2rem;}
  .pm-desktop{padding:0 2rem;}
  .pm-link{padding:.6rem .9rem;font-size:.68rem;}
  .product-layout{grid-template-columns:1fr;padding:2.5rem 2rem;}
  .prod-sticky{position:static;}
  .specs-grid{grid-template-columns:repeat(3,1fr);}
  .payment-grid{grid-template-columns:repeat(3,1fr);}
  .similar-section{padding:2.5rem 2rem;}
  .similar-grid{grid-template-columns:1fr;}
  .f-grid{grid-template-columns:1fr 1fr;gap:2rem;}
}
@media(max-width:680px){
  .top-bar{padding:.3rem 1rem;}
  .top-bar-left a:last-child{display:none;}
  nav{padding:.6rem 1rem;}
  .nav-search{margin-left:auto;background:transparent;border:none;}
  .nav-search-input{width:0;padding:0;opacity:0;}
  .nav-search-input.open{width:140px;padding:.4rem .75rem;opacity:1;}
  .nav-search-btn{background:transparent;color:var(--orange);padding:.4rem;font-size:1.1rem;}
  .pm-desktop{display:none;}
  .pm-mobile{display:grid;}
  .page-hero{padding:2rem 1.2rem;}
  .gallery-main{height:260px;}
  .g-thumb{width:72px;height:50px;}
  .product-layout{padding:1.5rem 1.2rem;gap:1.8rem;}
  .price-bar{flex-direction:column;align-items:flex-start;gap:.6rem;}
  .price-meta{text-align:left;}
  .specs-grid{grid-template-columns:repeat(2,1fr);}
  .features-grid{grid-template-columns:1fr;}
  .payment-grid{grid-template-columns:1fr;}
  .loc-details{grid-template-columns:1fr;}
  .similar-section{padding:2rem 1.2rem;}
  .sim-card{flex-direction:column;}
  .sim-img{width:100%;height:180px;}
  .f-grid{grid-template-columns:1fr;}
  footer{padding:3rem 1.2rem 2rem;}
}
